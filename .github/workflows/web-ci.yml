name: web-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
          
      - name: install
        run: npm ci --legacy-peer-deps
        
      - name: typecheck
        run: npx tsc --noEmit
        
      - name: lint
        run: npm run lint
        
      - name: vitest
        run: npx vitest run
        
      - name: build
        run: npm run build
